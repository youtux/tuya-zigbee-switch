name: Release Firmware

on:
  workflow_run:
    workflows: ["Build Firmware"]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest

    steps:
      # ── Preparation (no side effects) ──────────────────────────

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Python Virtual Environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: python-venv-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python3 -m venv .venv || true
          source .venv/bin/activate
          pip install -r requirements.txt

      - name: Install ORAS
        uses: oras-project/setup-oras@v1.2.4

      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: printf '%s' "$GITHUB_TOKEN" | oras login ghcr.io -u "$GH_ACTOR" --password-stdin

      - name: Generate OTA index and OCI push manifest
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          source .venv/bin/activate
          python3 helper_scripts/prepare_release.py \
            --tag "$TAG" --owner "$OWNER" --repo "$REPO" \
            --db-file device_db.yaml \
            --manifest oci_push_manifest.txt

      # ── Side effects (idempotent, applied only after all prep succeeds) ──

      - name: Push all firmware to ghcr.io
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Taken from Homebrew package publishing: https://github.com/Homebrew/brew/blob/62c59fa47bbbcf2ee21e90087561c72901f9191f/Library/Homebrew/github_packages.rb#L348
          ANNOTATION_FILE=annotations.json
          cat > "$ANNOTATION_FILE" <<EOF
          {
            "org.opencontainers.image.description": "Firmware blob for Zigbee device",
            "org.opencontainers.image.title": "Zigbee Firmware",
            "org.opencontainers.image.source": "https://github.com/$REPO",
            "org.opencontainers.image.documentation": "https://github.com/$REPO/blob/$TAG/readme.md",
            "org.opencontainers.image.version": "$TAG",
            "org.opencontainers.image.ref.name": "$TAG",
            "com.github.package.type": "firmware"
          }
          EOF

          parallel -v --colsep '\|' --halt soon,fail=1 --jobs 4 \
            oras push --annotation-file "$ANNOTATION_FILE" --artifact-type "application/octet-stream" {2} {1} \
            :::: oci_push_manifest.txt

          rm -f "$ANNOTATION_FILE"

      - name: Commit all generated files
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Switch to main and overwrite with release/tag files
          git fetch origin main
          git checkout main
          git checkout "$TAG" -- zha/ homed/ docs/supported_devices.md zigbee2mqtt/converters/ zigbee2mqtt/converters_v1/ zigbee2mqtt/ota/

          # Stage everything: converters, quirks, docs, AND OTA index
          git add -A zha/ homed/ docs/supported_devices.md zigbee2mqtt/converters/ zigbee2mqtt/converters_v1/ zigbee2mqtt/ota/

          # Idempotent: skip if nothing changed (e.g. re-run of same tag)
          git diff --cached --quiet && echo "Nothing to commit" && exit 0

          git commit -m "Release $TAG: update converters, quirks, and OTA index"
          git push origin main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Idempotent: create if new, edit if already exists
          gh release create "$TAG" \
            --generate-notes \
            --title "$TAG" \
          || gh release edit "$TAG" --generate-notes
